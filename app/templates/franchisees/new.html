{% extends "base.html" %}
{% block content %}
  <h1>Новый франчайзи</h1>
  <p class="toolbar"><a class="back-link" href="/franchisees">← К списку франчайзи</a></p>

  {% if form_error %}
    {% set error = form_error %}
    {% include "includes/rms_inline_error.html" %}
  {% endif %}

  <div class="card">
    <form method="post" action="/franchisees/new">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <table class="form-table">
        <tr>
          <td><label for="name">Название *</label></td>
          <td><input id="name" name="name" type="text" required style="width:100%; max-width:400px;" value="{{ form_values.name if form_values else '' }}" /></td>
        </tr>
        <tr>
          <td><label for="org_id">ИНН (org_id)</label></td>
          <td><input id="org_id" name="org_id" type="text" style="width:100%; max-width:200px;" placeholder="целое число" value="{{ form_values.org_id if form_values else '' }}" /></td>
        </tr>
        <tr>
          <td><label for="user_id">user_id</label></td>
          <td><input id="user_id" name="user_id" type="text" style="width:100%; max-width:400px;" value="{{ form_values.user_id if form_values else '' }}" /></td>
        </tr>
        <tr>
          <td></td>
          <td><button type="submit">Создать</button></td>
        </tr>
      </table>
    </form>
  </div>
{% endblock %}
